<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>购物车 - 福理工商城</title>

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #E11D48;
      --color-primary-container:    #FFE4E6;
      --color-on-primary:           #ffffff;
      --color-background:                 #FFFFFF;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FAFAFA;
      --color-surface-container:          #F5F5F5;
      --color-surface-container-high:     #E5E5E5;
      --color-surface-container-highest:  #D4D4D4;
      --color-on-surface:           #18181B;
      --color-on-surface-variant:   #71717A;
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      --color-outline:          #E4E4E7;
      --color-outline-variant:  #A1A1AA;
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 4px 12px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: "Manrope", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body { min-height: max(812px, 100dvh); font-family: system-ui, sans-serif; }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- Header -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <h1 class="text-lg font-bold text-on-surface">购物车</h1>
    <button class="text-sm text-on-surface-variant hover:text-primary transition-colors">管理</button>
  </header>

  <!-- Main Content -->
  <main class="overflow-y-auto pb-[calc(5rem+env(safe-area-inset-bottom))]">

    <!-- 购物车商品列表 -->
    <section class="px-4 pt-4">
      <div class="flex flex-col gap-3">
        <!-- 商品 1 -->
        <div class="bg-surface rounded-xl shadow-card flex gap-3 p-3">
          <div class="flex items-center flex-shrink-0">
            <input type="checkbox" checked class="w-5 h-5 rounded border-2 border-outline-variant accent-primary">
          </div>
          <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200&h=150" alt="无线耳机" data-category="商业科技" class="w-20 h-20 object-cover rounded-lg flex-shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-semibold text-on-surface truncate">蓝牙无线耳机 Pro版</h3>
            <p class="text-xs text-on-surface-variant mt-1">白色 · 降噪版</p>
            <div class="flex items-center justify-between mt-2">
              <span class="text-base font-bold text-primary">¥129</span>
              <div class="flex items-center gap-2 bg-surface-container rounded-full">
                <button class="w-7 h-7 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                  <i data-lucide="minus" class="w-4 h-4"></i>
                </button>
                <span class="text-sm font-semibold text-on-surface w-6 text-center">1</span>
                <button class="w-7 h-7 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                  <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 商品 2 -->
        <div class="bg-surface rounded-xl shadow-card flex gap-3 p-3">
          <div class="flex items-center flex-shrink-0">
            <input type="checkbox" checked class="w-5 h-5 rounded border-2 border-outline-variant accent-primary">
          </div>
          <img src="https://images.unsplash.com/photo-1585386959914-3b3e4e5e0c4e?w=200&h=150" alt="护眼台灯" data-category="商业科技" class="w-20 h-20 object-cover rounded-lg flex-shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-semibold text-on-surface truncate">智能护眼台灯</h3>
            <p class="text-xs text-on-surface-variant mt-1">白色 · 三档调节</p>
            <div class="flex items-center justify-between mt-2">
              <span class="text-base font-bold text-primary">¥68</span>
              <div class="flex items-center gap-2 bg-surface-container rounded-full">
                <button class="w-7 h-7 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                  <i data-lucide="minus" class="w-4 h-4"></i>
                </button>
                <span class="text-sm font-semibold text-on-surface w-6 text-center">2</span>
                <button class="w-7 h-7 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                  <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 商品 3 -->
        <div class="bg-surface rounded-xl shadow-card flex gap-3 p-3">
          <div class="flex items-center flex-shrink-0">
            <input type="checkbox" class="w-5 h-5 rounded border-2 border-outline-variant accent-primary">
          </div>
          <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=200&h=150" alt="笔记本" data-category="其他" class="w-20 h-20 object-cover rounded-lg flex-shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-semibold text-on-surface truncate">精美学习笔记本</h3>
            <p class="text-xs text-on-surface-variant mt-1">A5 · 100页</p>
            <div class="flex items-center justify-between mt-2">
              <span class="text-base font-bold text-primary">¥15</span>
              <div class="flex items-center gap-2 bg-surface-container rounded-full">
                <button class="w-7 h-7 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                  <i data-lucide="minus" class="w-4 h-4"></i>
                </button>
                <span class="text-sm font-semibold text-on-surface w-6 text-center">5</span>
                <button class="w-7 h-7 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                  <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 优惠券/促销提示 -->
    <section class="px-4 pt-4">
      <div class="bg-primary-container rounded-xl p-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i data-lucide="ticket" class="w-5 h-5 text-primary"></i>
          <span class="text-sm font-semibold text-on-surface">新人专享优惠券</span>
        </div>
        <span class="text-sm font-bold text-primary">-¥20</span>
      </div>
    </section>

  </main>

  <!-- 底部结算栏 -->
  <div class="fixed bottom-0 left-0 right-0 z-50 bg-surface border-t border-outline-variant/20 pb-[env(safe-area-inset-bottom)]">
    <!-- TabBar -->
    <nav class="flex justify-around items-center h-14">
      <a href="home.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold tracking-wide">首页</span>
      </a>
      <a href="hot.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
        <i data-lucide="flame" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold tracking-wide">热销</span>
      </a>
      <a href="cart.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5 text-primary" aria-current="page">
        <i data-lucide="shopping-cart" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold tracking-wide">购物车</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5 px-4 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
        <i data-lucide="user" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold tracking-wide">我的</span>
      </a>
    </nav>
    <!-- 结算栏 -->
    <div class="flex items-center justify-between px-4 py-3 bg-background">
      <div class="flex items-center gap-3">
        <input type="checkbox" checked class="w-5 h-5 rounded border-2 border-outline-variant accent-primary">
        <span class="text-sm text-on-surface-variant">全选</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex flex-col items-end">
          <div class="flex items-baseline gap-1">
            <span class="text-xs text-on-surface-variant">合计:</span>
            <span class="text-xl font-bold text-primary">¥265</span>
          </div>
          <span class="text-xs text-success">已优惠 ¥20</span>
        </div>
        <button class="bg-primary text-on-primary px-6 py-2.5 rounded-full font-semibold text-sm shadow-float hover:shadow-lg transition-shadow">
          结算(3)
        </button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>

</html>
